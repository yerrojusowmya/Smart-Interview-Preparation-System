<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <style>

        body{
            background-color:#f4f4f4;
            font-family:Arial;
            text-align:center;
            margin-top:100px;
        }

        .box{
            background:white;
            width:300px;
            margin:auto;
            padding:30px;
            border-radius:10px;
        }

        input{
            width:90%;
            padding:10px;
        }

        button{
            padding:10px 20px;
            background:darkblue;
            color:white;
            border:none;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div class="box">

<h1>Login</h1>

<input type="text" placeholder="Username">

<br><br>

<input type="password" placeholder="Password">

<br><br>

<button>Login</button>

</div>

</body>

</html>
